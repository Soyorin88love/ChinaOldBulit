<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>xiangxi-map-align-check</title>
    <style>
      html,
      body,
      iframe {
        width: 100%;
        height: 100%;
        margin: 0;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="frame" src="../xiangxi/index.html" title="xiangxi-map-align-check"></iframe>
    <pre id="log" style="position:fixed;left:16px;bottom:16px;z-index:10;margin:0;padding:12px 14px;border-radius:12px;background:rgba(15,20,20,.78);color:#fff;font:14px/1.6 Consolas,monospace;"></pre>
    <script>
      const frame = document.getElementById("frame");
      const log = document.getElementById("log");
      frame.addEventListener("load", () => {
        const doc = frame.contentDocument;
        const button = doc.getElementById("anniuDiqu");
        if (button) button.click();
        window.setTimeout(() => {
          const region = doc.getElementById("diquZhanshi");
          if (region) {
            frame.contentWindow.scrollTo(0, region.offsetTop - 24);
          }
          const hebei = doc.querySelector('[data-shengfen="河北"]');
          if (hebei) hebei.click();
          const neiceng = doc.getElementById("dituNeiceng");
          const dianceng = doc.getElementById("dituDianceng");
          const neicengRect = neiceng.getBoundingClientRect();
          const diancengRect = dianceng.getBoundingClientRect();
          log.textContent =
            `neiceng: ${Math.round(neicengRect.width)} x ${Math.round(neicengRect.height)}\n` +
            `dianceng: ${Math.round(diancengRect.width)} x ${Math.round(diancengRect.height)}\n` +
            `offset: ${Math.round(diancengRect.left - neicengRect.left)}, ${Math.round(diancengRect.top - neicengRect.top)}`;
        }, 300);
      });
    </script>
  </body>
</html>
